<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terres de Konne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14121c;
    --panel:#1e1a29;
    --panel-2:#25202f;
    --line:#3a3247;
    --gold:#c9a24b;
    --gold-bright:#e9c874;
    --parchment:#e8e1cf;
    --parchment-dim:#a89d84;
    --blood:#8a2f2f;
    --blood-bright:#c24b4b;
    --emerald:#4a7c59;
    --emerald-bright:#6fae83;
    --sapphire:#3f5f8a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:
      radial-gradient(ellipse at top, #241f33 0%, var(--bg) 60%),
      var(--bg);
    color:var(--parchment);
    font-family:'EB Garamond', serif;
    font-size:18px;
    min-height:100vh;
  }
  h1,h2,h3,h4,.display{
    font-family:'Cinzel', serif;
    letter-spacing:0.03em;
    color:var(--gold-bright);
    margin:0;
  }
  #app{max-width:1000px;margin:0 auto;padding:28px 20px 60px;min-height:100vh;}
  .eyebrow{
    font-family:'Cinzel',serif;
    font-size:12px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--parchment-dim);
    margin-bottom:6px;
  }
  .panel{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:6px;
    padding:24px;
    position:relative;
  }
  .panel::before{
    content:'';
    position:absolute; inset:6px;
    border:1px solid rgba(201,162,75,0.15);
    border-radius:3px;
    pointer-events:none;
  }
  .btn{
    font-family:'Cinzel',serif;
    font-size:14px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    background:linear-gradient(180deg, #3a3247, #2a2436);
    color:var(--parchment);
    border:1px solid var(--gold);
    border-radius:4px;
    padding:12px 20px;
    cursor:pointer;
    transition:all .15s ease;
  }
  .btn:hover{background:linear-gradient(180deg, #4a4257, #3a3446); color:var(--gold-bright); transform:translateY(-1px);}
  .btn:active{transform:translateY(0);}
  .btn:disabled{opacity:0.35; cursor:not-allowed; transform:none;}
  .btn-primary{background:linear-gradient(180deg, var(--gold), #a4813a); color:#1a1622; border-color:var(--gold-bright); font-weight:700;}
  .btn-primary:hover{background:linear-gradient(180deg, var(--gold-bright), var(--gold)); color:#1a1622;}
  .btn-danger{border-color:var(--blood-bright); }
  .btn-danger:hover{color:var(--blood-bright);}
  .btn-small{padding:7px 12px; font-size:12px;}
  input, select, textarea{
    font-family:'EB Garamond', serif;
    font-size:17px;
    background:#100e17;
    border:1px solid var(--line);
    color:var(--parchment);
    border-radius:4px;
    padding:10px 12px;
    width:100%;
  }
  input:focus, select:focus{outline:none; border-color:var(--gold);}
  label{display:block; font-size:13px; color:var(--parchment-dim); margin-bottom:6px; font-family:'Cinzel',serif; letter-spacing:0.05em;}
  .field{margin-bottom:16px;}
  .row{display:flex; gap:14px; flex-wrap:wrap;}
  .center{display:flex; align-items:center; justify-content:center;}
  .muted{color:var(--parchment-dim);}
  .divider{height:1px; background:linear-gradient(90deg, transparent, var(--line), transparent); margin:22px 0;}
  .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:26px; flex-wrap:wrap; gap:10px;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .sigil{font-size:26px;}
  .navgrid{display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:14px; margin-top:20px;}
  .navcard{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:6px;
    padding:22px 16px;
    text-align:center;
    cursor:pointer;
    transition:all .15s ease;
  }
  .navcard:hover{border-color:var(--gold); transform:translateY(-2px);}
  .navcard.locked{opacity:.4; cursor:not-allowed;}
  .navcard.locked:hover{transform:none; border-color:var(--line);}
  .navcard .icon{font-size:30px; display:block; margin-bottom:8px;}
  .navcard .label{font-family:'Cinzel',serif; font-size:14px; letter-spacing:0.05em;}
  .navcard .sub{font-size:12px; color:var(--parchment-dim); margin-top:4px;}
  .classcard{
    border:1px solid var(--line);
    border-radius:6px;
    padding:20px;
    cursor:pointer;
    text-align:center;
    background:var(--panel);
    transition:all .15s ease;
  }
  .classcard.selected{border-color:var(--gold); background:var(--panel-2); box-shadow:0 0 0 1px var(--gold) inset;}
  .classcard .icon{font-size:44px;}
  .badge{
    display:inline-block; font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.06em;
    padding:3px 9px; border-radius:20px; border:1px solid var(--line); color:var(--parchment-dim);
  }
  .badge.gold{border-color:var(--gold); color:var(--gold-bright);}
  .xpbar{height:10px; border-radius:6px; background:#100e17; border:1px solid var(--line); overflow:hidden;}
  .xpbar-fill{height:100%; background:linear-gradient(90deg, var(--emerald), var(--emerald-bright)); transition:width .4s ease;}
  .memberrow{display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--line);}
  .memberrow:last-child{border-bottom:none;}
  .dungeon-card{
    border:1px solid var(--line); border-radius:6px; padding:20px; background:var(--panel);
    display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:14px;
  }
  .diff-Facile{color:var(--emerald-bright);}
  .diff-Moyen{color:var(--gold-bright);}
  .diff-Difficile{color:#d98a4b;}
  .diff-Impossible{color:var(--blood-bright);}
  .tier-display{
    font-family:'Cinzel',serif; font-weight:900; font-size:min(22vw,140px); line-height:1;
    text-align:center; color:var(--gold-bright);
    text-shadow:0 0 40px rgba(201,162,75,0.35);
  }
  .toast{
    position:fixed; top:18px; right:18px; z-index:999;
    background:var(--panel-2); border:1px solid var(--gold); border-radius:6px; padding:14px 18px;
    font-family:'Cinzel',serif; font-size:13px; color:var(--gold-bright); max-width:280px;
    box-shadow:0 8px 30px rgba(0,0,0,0.5);
    animation:slidein .25s ease;
  }
  @keyframes slidein{from{transform:translateX(30px);opacity:0;} to{transform:translateX(0);opacity:1;}}
  .levelup-overlay{
    position:fixed; inset:0; background:rgba(10,8,14,0.85); z-index:1000;
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    animation:fadein .3s ease;
  }
  @keyframes fadein{from{opacity:0;} to{opacity:1;}}
  .levelup-num{
    font-family:'Cinzel',serif; font-weight:900; font-size:120px; color:var(--gold-bright);
    text-shadow:0 0 60px var(--gold); animation:pop .5s cubic-bezier(.3,1.6,.5,1);
  }
  @keyframes pop{0%{transform:scale(0.2); opacity:0;} 70%{transform:scale(1.15);} 100%{transform:scale(1); opacity:1;}}
  .chest{
    width:160px; height:160px; margin:0 auto; display:flex; align-items:center; justify-content:center;
    font-size:80px; cursor:pointer; user-select:none; transition:transform .08s ease;
    border-radius:50%; border:2px solid var(--gold); background:var(--panel-2);
  }
  .chest:active{transform:scale(0.94);}
  table{width:100%; border-collapse:collapse;}
  th,td{text-align:left; padding:8px 10px; border-bottom:1px solid var(--line); font-size:15px;}
  th{font-family:'Cinzel',serif; font-size:11px; letter-spacing:0.06em; color:var(--parchment-dim); text-transform:uppercase;}
  .authwrap{max-width:420px; margin:6vh auto 0;}
  .link-btn{background:none; border:none; color:var(--gold-bright); font-family:'EB Garamond',serif; text-decoration:underline; cursor:pointer; font-size:15px; padding:0;}
  .errbox{color:var(--blood-bright); font-size:14px; margin-top:10px;}
  .item-pill{display:inline-block; background:var(--panel-2); border:1px solid var(--line); border-radius:20px; padding:4px 12px; font-size:14px; margin:3px 4px 0 0;}
  ::selection{background:var(--gold); color:#1a1622;}
  .footer-admin{position:fixed; bottom:10px; left:10px; font-size:11px; color:#4a4257;}

  /* ---- Combat de boss ---- */
  .boss-panel{
    border-color:var(--blood-bright) !important;
    background:linear-gradient(180deg, #2a1416, #1c0f12) !important;
    animation:bossGlow 2.2s ease-in-out infinite;
  }
  @keyframes bossGlow{
    0%,100%{ box-shadow:0 0 30px rgba(194,75,75,0.25), inset 0 0 40px rgba(138,47,47,0.15); }
    50%{ box-shadow:0 0 75px rgba(194,75,75,0.6), inset 0 0 90px rgba(138,47,47,0.35); }
  }
  .boss-tier-display{
    font-size:min(28vw,190px) !important;
    color:var(--blood-bright) !important;
    text-shadow:0 0 60px rgba(194,75,75,0.7), 0 0 130px rgba(194,75,75,0.4) !important;
    animation:bossPulseText 1.5s ease-in-out infinite;
  }
  @keyframes bossPulseText{0%,100%{transform:scale(1);} 50%{transform:scale(1.06);}}
  .boss-badge{
    display:inline-block; font-family:'Cinzel',serif; font-size:16px; letter-spacing:0.12em;
    padding:9px 22px; border-radius:24px; border:2px solid var(--blood-bright); color:#fff;
    background:linear-gradient(180deg, var(--blood), #4a1a1a);
    text-transform:uppercase; margin-top:16px;
    animation:bossBadgePulse 1.3s ease-in-out infinite;
  }
  @keyframes bossBadgePulse{
    0%,100%{ transform:scale(1); box-shadow:0 0 20px rgba(194,75,75,0.5); }
    50%{ transform:scale(1.1); box-shadow:0 0 45px rgba(194,75,75,0.95); }
  }
  .boss-warn{color:var(--blood-bright); font-family:'Cinzel',serif; letter-spacing:0.06em; margin-top:10px;}

  /* ---- Victoire finale ---- */
  .confetti-wrap{position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:998;}
  .confetti-piece{position:absolute; top:-24px; opacity:0.9; border-radius:2px; animation-name:confettiFall; animation-timing-function:linear; animation-iteration-count:infinite;}
  @keyframes confettiFall{0%{transform:translateY(-10vh) rotate(0deg);} 100%{transform:translateY(112vh) rotate(360deg);}}
  .victory-banner{text-align:center; margin:6px 0 18px; animation:victoryPop .7s cubic-bezier(.3,1.6,.5,1);}
  .victory-title{
    font-family:'Cinzel',serif; font-weight:900; font-size:min(12vw,58px);
    background:linear-gradient(180deg, var(--gold-bright), var(--gold));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    filter:drop-shadow(0 0 30px rgba(201,162,75,0.6));
    letter-spacing:0.04em;
  }
  @keyframes victoryPop{0%{transform:scale(0.3) rotate(-4deg); opacity:0;} 60%{transform:scale(1.08) rotate(2deg);} 100%{transform:scale(1) rotate(0); opacity:1;}}

  /* ---- Cinématique de fin (épilogue) ---- */
  .cinematic-overlay{
    position:fixed; inset:0; z-index:1200;
    background:radial-gradient(ellipse at 50% 30%, #1c1622 0%, #08070c 75%);
    display:flex; flex-direction:column; align-items:center;
    padding:8vh 20px 40px;
  }
  .cinematic-skip{position:absolute; top:18px; right:18px; z-index:1201;}
  .cinematic-crown{font-size:64px; text-align:center; filter:drop-shadow(0 0 25px rgba(233,200,116,0.7)); animation:pop .7s cubic-bezier(.3,1.6,.5,1);}
  .cinematic-title{
    font-family:'Cinzel',serif; font-weight:700; letter-spacing:0.3em; text-transform:uppercase;
    color:var(--gold-bright); font-size:15px; text-align:center; margin-top:10px;
  }
  .cinematic-scroll{
    width:min(640px,90vw); max-height:62vh; overflow-y:auto; margin-top:26px;
    padding-right:8px;
  }
  .cinematic-scroll::-webkit-scrollbar{width:5px;}
  .cinematic-scroll::-webkit-scrollbar-thumb{background:var(--line); border-radius:4px;}
  .cinematic-line{
    font-family:'EB Garamond',serif; font-size:19px; line-height:1.75; color:var(--parchment);
    text-align:center; margin:0 0 26px;
    opacity:0; transform:translateY(16px);
    transition:opacity 1.3s ease, transform 1.3s ease;
  }
  .cinematic-line.show{opacity:1; transform:translateY(0);}
  .cinematic-heroes-title{
    font-family:'Cinzel',serif; text-align:center; color:var(--gold-bright); font-size:20px;
    letter-spacing:0.12em; text-transform:uppercase; margin:18px 0 20px;
    opacity:0; transition:opacity 1.1s ease;
  }
  .cinematic-heroes-title.show{opacity:1;}
  .cinematic-hero-name{
    font-family:'Cinzel',serif; text-align:center; font-size:27px; color:var(--gold-bright);
    text-shadow:0 0 22px rgba(201,162,75,0.7); margin-bottom:12px;
    opacity:0; transform:scale(0.8);
    transition:opacity .6s ease, transform .6s cubic-bezier(.3,1.6,.5,1);
  }
  .cinematic-hero-name.show{opacity:1; transform:scale(1);}
  .cinematic-continue{margin-top:30px; opacity:0; transition:opacity .6s ease;}
  .cinematic-continue.show{opacity:1;}
</style>
</head>
<body>
<div id="app"></div>
<div id="overlays"></div>

<script>
/* =========================================================
   TERRES DE KONNE — mini-MMORPG simulé
   Etat partagé via window.storage (shared:true) pour que
   tous les joueurs / l'admin voient le même monde.
   ========================================================= */

// ---------- Config ----------
const DUNGEONS = {
  facile:      { key:'facile',      name:'Camp Barbares',            diff:'Facile',      tiers:3, gold:2, xp:5  },
  moyen:       { key:'moyen',       name:'Pyramides du Sphinx',      diff:'Moyen',       tiers:4, gold:4, xp:15 },
  difficile:   { key:'difficile',   name:'Le Cimetière',             diff:'Difficile',   tiers:5, gold:6, xp:35 },
  impossible:  { key:'impossible',  name:"Château de l'Empereur Konne", diff:'Impossible', tiers:6, gold:9, xp:50 }
};
const TIER_MS = 10*60*1000;
const BREAK_MS = 10*60*1000;
const MAX_LEVEL = 30;
const CLASSES = {
  guerrier:{label:'Guerrier', icon:'⚔️', desc:'Force brute et endurance au corps-à-corps.'},
  mage:{label:'Mage', icon:'🔮', desc:'Maîtrise des arcanes et de la magie destructrice.'},
  paladin:{label:'Paladin', icon:'🛡️', desc:'Foi et acier, gardien de ses compagnons.'}
};
const RARITIES = {
  commun:     {label:'Commun',     min:1,  max:10,  color:'#a8a2b8'},
  rare:       {label:'Rare',       min:10, max:30,  color:'#3f5f8a'},
  tres_rare:  {label:'Très rare',  min:30, max:50,  color:'#8a5fc9'},
  legendaire: {label:'Légendaire', min:50, max:100, color:'#e9c874'}
};
// Bonus de puissance gagné en achetant un objet, selon sa rareté.
const POWER_BY_RARITY = { commun:1, rare:3, tres_rare:6, legendaire:12 };

// Catégories fixes de l'hôtel des ventes — l'admin ne peut plus en créer,
// il choisit seulement parmi celles-ci en créant un objet.
const CATEGORY_TREE = [
  { id:'arme', name:'Arme', subs:[
    { id:'arme_une_main', name:'Une main' },
    { id:'arme_deux_mains', name:'2 mains' },
    { id:'arme_distance', name:'À distance' },
    { id:'arme_magie', name:'Magie' },
    { id:'arme_autre', name:'Autre' }
  ]},
  { id:'sort', name:'Sort', subs:[
    { id:'sort_destruction', name:'Destruction' },
    { id:'sort_soin', name:'Soin' },
    { id:'sort_nature', name:'Pouvoir de la nature' },
    { id:'sort_speciaux', name:'Spéciaux' }
  ]},
  { id:'potion', name:'Potion', subs:[] },
  { id:'enchantement', name:'Enchantement', subs:[
    { id:'enchant_arme', name:'Enchantement arme' },
    { id:'enchant_arc', name:'Enchantement arc' },
    { id:'enchant_baguette', name:'Enchantement baguette' }
  ]}
];
function findCategoryTop(id){ return CATEGORY_TREE.find(c=>c.id===id) || null; }
function findCategorySub(topId, subId){
  const top = findCategoryTop(topId);
  if(!top) return null;
  return top.subs.find(s=>s.id===subId) || null;
}

function xpNeeded(level){ return 10*(level+1); }

function confettiHTML(count){
  const colors = ['#c9a24b','#e9c874','#c24b4b','#8a2f2f','#5fae7a','#3f5f8a','#8a5fc9'];
  let pieces = '';
  for(let i=0;i<count;i++){
    const left = (Math.random()*100).toFixed(2);
    const delay = (Math.random()*2.2).toFixed(2);
    const duration = (2.6 + Math.random()*2.2).toFixed(2);
    const color = colors[Math.floor(Math.random()*colors.length)];
    const w = (5 + Math.random()*8).toFixed(1);
    const h = (w*0.45).toFixed(1);
    pieces += `<div class="confetti-piece" style="left:${left}%; background:${color}; width:${w}px; height:${h}px; animation-delay:${delay}s; animation-duration:${duration}s;"></div>`;
  }
  return `<div class="confetti-wrap">${pieces}</div>`;
}

// ---------- Cinématique de fin (épilogue) ----------
const EPILOGUE_PARAGRAPHS = [
  "Alors que le dernier écho de la bataille s'éteint, un profond silence retombe sur les terres. Le vent emporte la poussière du combat, et les ténèbres qui pesaient depuis si longtemps sur le royaume commencent enfin à se dissiper.",
  "Konne est tombé. Celui dont le nom inspirait la peur n'est plus qu'un souvenir. Son ambition, sa colère et son pouvoir se sont éteints avec lui.",
  "Mais cette victoire n'a pas été offerte par le destin. Elle a été forgée par le courage, la solidarité et les sacrifices de ceux qui ont refusé d'abandonner.",
  "Aujourd'hui, le royaume retrouve enfin l'espoir. Les villages se relèveront. Les routes seront de nouveau parcourues par les marchands, les aventuriers et les voyageurs.",
  "Les chants remplaceront les cris de guerre, et les enfants grandiront dans un monde où le nom de Konne ne sera plus qu'une vieille histoire racontée au coin du feu.",
  "Pourtant, les plus anciens le savent... Aucune paix n'est éternelle. Un jour, d'autres héros devront peut-être se lever pour défendre ces terres. Mais ce jour n'est pas aujourd'hui.",
  "Aujourd'hui, les armes peuvent être déposées. Aujourd'hui, les flammes des foyers brûlent à nouveau. Aujourd'hui... c'est votre victoire.",
  "Que vos exploits soient gravés dans la pierre, chantés par les bardes et transmis de génération en génération.",
  "Car tant que ces histoires seront racontées...",
  "Vos noms ne tomberont jamais dans l'oubli."
];

// Affiche l'épilogue : le texte apparaît paragraphe par paragraphe en
// fondu, le conteneur défile automatiquement, puis les noms des héros
// se révèlent un par un. Un bouton "Passer" permet de tout afficher
// d'un coup, et le bouton "Continuer" n'apparaît qu'à la toute fin.
function showEpilogueCinematic(heroNames){
  const names = (heroNames && heroNames.length) ? heroNames : ['Un héros sans nom'];
  const el = document.getElementById('overlays');
  const div = document.createElement('div');
  div.className = 'cinematic-overlay';
  div.innerHTML = `
    <div class="cinematic-skip"><button class="btn btn-small" id="cinematic-skip-btn">Passer ▶</button></div>
    <div class="cinematic-crown">👑</div>
    <div class="cinematic-title">Épilogue</div>
    <div class="cinematic-scroll" id="cinematic-scroll"></div>
    <div class="cinematic-continue" id="cinematic-continue">
      <button class="btn btn-primary" id="cinematic-continue-btn">Continuer</button>
    </div>
  `;
  el.appendChild(div);

  const scrollEl = div.querySelector('#cinematic-scroll');
  const continueWrap = div.querySelector('#cinematic-continue');
  let timers = [];
  let finished = false;

  function scrollDown(){ scrollEl.scrollTop = scrollEl.scrollHeight; }

  function revealAll(){
    timers.forEach(t=>clearTimeout(t));
    timers = [];
    if(finished) return;
    finished = true;
    scrollEl.innerHTML = '';
    EPILOGUE_PARAGRAPHS.forEach(txt=>{
      const p = document.createElement('p');
      p.className = 'cinematic-line show';
      p.textContent = txt;
      scrollEl.appendChild(p);
    });
    const h = document.createElement('div');
    h.className = 'cinematic-heroes-title show';
    h.textContent = 'Les héros de cette victoire';
    scrollEl.appendChild(h);
    names.forEach(name=>{
      const n = document.createElement('div');
      n.className = 'cinematic-hero-name show';
      n.textContent = name;
      scrollEl.appendChild(n);
    });
    scrollDown();
    continueWrap.classList.add('show');
  }

  function addHeroNames(i){
    if(i >= names.length){
      finished = true;
      continueWrap.classList.add('show');
      return;
    }
    const n = document.createElement('div');
    n.className = 'cinematic-hero-name';
    n.textContent = names[i];
    scrollEl.appendChild(n);
    requestAnimationFrame(()=>n.classList.add('show'));
    scrollDown();
    timers.push(setTimeout(()=>addHeroNames(i+1), 750));
  }

  function addHeroesTitle(){
    const h = document.createElement('div');
    h.className = 'cinematic-heroes-title';
    h.textContent = 'Les héros de cette victoire';
    scrollEl.appendChild(h);
    requestAnimationFrame(()=>h.classList.add('show'));
    scrollDown();
    timers.push(setTimeout(()=>addHeroNames(0), 1400));
  }

  function addParagraph(i){
    if(i >= EPILOGUE_PARAGRAPHS.length){
      timers.push(setTimeout(addHeroesTitle, 900));
      return;
    }
    const p = document.createElement('p');
    p.className = 'cinematic-line';
    p.textContent = EPILOGUE_PARAGRAPHS[i];
    scrollEl.appendChild(p);
    requestAnimationFrame(()=>p.classList.add('show'));
    scrollDown();
    timers.push(setTimeout(()=>addParagraph(i+1), 3400));
  }

  div.querySelector('#cinematic-skip-btn').addEventListener('click', revealAll);
  div.querySelector('#cinematic-continue-btn').addEventListener('click', ()=>div.remove());
  addParagraph(0);
}

// ---------- Storage helpers ----------
// Ces fonctions parlent au petit serveur (server.js) qui garde l'état
// du monde en mémoire / dans un fichier JSON sur le serveur, afin que
// tous les joueurs connectés à ton site voient le même monde.
async function getData(key, def){
  try{
    const r = await fetch('/api/kv/' + encodeURIComponent(key));
    if(r.status === 404) return def;
    if(!r.ok) return def;
    const data = await r.json();
    return (data && data.value !== undefined) ? data.value : def;
  }catch(e){ console.error('getData failed', key, e); return def; }
}
async function setData(key, value){
  try{
    await fetch('/api/kv/' + encodeURIComponent(key), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value })
    });
  }catch(e){ console.error('setData failed', key, e); }
}
// Pour les opérations qui doivent être atomiques côté serveur (achat/vente
// à l'hôtel des ventes) plutôt qu'un get+set séparé côté client.
async function apiPost(url, body){
  try{
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body || {})
    });
    const data = await r.json().catch(()=>({}));
    return { ok: r.ok && data.ok !== false, status: r.status, data };
  }catch(e){ console.error('apiPost failed', url, e); return { ok:false, data:{error:'network'} }; }
}

// ---------- Auth ----------
async function handleAuthSubmit(e){
  e.preventDefault();
  const pseudo = document.getElementById('inp-pseudo').value.trim();
  const pass = document.getElementById('inp-pass').value;
  if(!pseudo || !pass){ S.authError='Pseudo et mot de passe requis.'; render(); return; }
  const key = pseudo.toLowerCase();
  const users = await getData('users', {});

  if(S.authMode === 'login'){
    const u = users[key];
    if(!u){ S.authError = "Ce pseudo n'existe pas encore. Crée un compte."; render(); return; }
    if(u.password !== pass){ S.authError = 'Mot de passe incorrect.'; render(); return; }
    S.currentUser = key;
    S.authError='';
    if(u.isAdmin){ S.view='adminPanel'; }
    else if(!u.class){ S.view='charCreate'; }
    else { S.view='village'; }
    render();
  } else {
    if(users[key]){ S.authError = 'Ce pseudo est déjà pris.'; render(); return; }
    const isAdmin = key === 'admin';
    users[key] = {
      pseudo, password: pass, isAdmin,
      class: isAdmin ? 'admin' : null,
      level: 0, xp: 0, gold: isAdmin ? 0 : 10, power: 0,
      items: [], guildId: null
    };
    await setData('users', users);
    S.currentUser = key;
    S.authError='';
    S.view = isAdmin ? 'adminPanel' : 'charCreate';
    render();
  }
}

async function respondInvite(idx, accept){
  const notifs = await getData('notifications', {});
  const mine = notifs[S.currentUser] || [];
  const invite = mine[idx];
  if(!invite) return;
  mine.splice(idx,1);
  notifs[S.currentUser] = mine;
  await setData('notifications', notifs);

  if(invite.type === 'rpInvite'){
    if(accept){
      const rp = await getData('rpSession', null);
      if(rp && (rp.status==='draft' || rp.status==='active')){
        rp.participants = rp.participants || [];
        if(!rp.participants.includes(S.currentUser)) rp.participants.push(S.currentUser);
        if(rp.status==='draft' && !rp.waitingSince) rp.waitingSince = Date.now();
        await setData('rpSession', rp);
        toast(rp.status==='draft' ? 'Tu es transporté dans le salon — la scène démarre sous peu...' : 'Tu es transporté dans la scène...');
        S.view = 'rp';
      } else {
        toast('Ce salon est fermé pour le moment.');
      }
    } else {
      toast('Invitation refusée.');
    }
    render();
    return;
  }

  const guilds = await getData('guilds', {});
  const g = guilds[invite.guildId];
  if(g){
    g.invitesPending = (g.invitesPending||[]).filter(p=>p!==S.currentUser);
    if(accept){
      if(!g.members.includes(S.currentUser)) g.members.push(S.currentUser);
      const users = await getData('users', {});
      users[S.currentUser].guildId = g.id;
      await setData('users', users);
      toast(`Tu as rejoint la guilde ${g.name} !`);
    } else {
      toast('Invitation refusée.');
    }
    await setData('guilds', guilds);
  }
  render();
}

// Termine un donjon (victoire ou défaite) : applique le statut,
// crédite la réputation de guilde une seule fois, et sauvegarde.
async function finalizeDungeon(dungeon, result){
  dungeon.status = result;
  dungeon.onBreak = false;
  if(result==='won') dungeon.tiersCompleted = dungeon.totalTiers;
  if(dungeon.guildId && !dungeon.repAdded){
    const guilds = await getData('guilds', {});
    const g = guilds[dungeon.guildId];
    if(g){ g.reputation += dungeon.tiersCompleted; await setData('guilds', guilds); }
    dungeon.repAdded = true;
  }
  await setData('dungeon', dungeon);
  return dungeon;
}

// Vérifie si le temps global du donjon est écoulé sans que tous les
// tiers aient été validés : dans ce cas, défaite automatique.
// Appelé à chaque affichage pertinent pour rester synchrone entre joueurs.
async function checkAutoResolve(dungeon){
  if(!dungeon || dungeon.status!=='active') return dungeon;
  const totalDuration = dungeon.totalTiers * TIER_MS;
  const elapsed = Date.now() - dungeon.startTime;
  if(dungeon.tiersCompleted >= dungeon.totalTiers){
    return await finalizeDungeon(dungeon, 'won');
  }
  if(elapsed >= totalDuration){
    return await finalizeDungeon(dungeon, 'lost');
  }
  return dungeon;
}

async function adminAdvanceTier(){
  let dungeon = await getData('dungeon', null);
  if(!dungeon || dungeon.status!=='active') return;
  dungeon.tiersCompleted = Math.min(dungeon.tiersCompleted+1, dungeon.totalTiers);
  if(dungeon.tiersCompleted >= dungeon.totalTiers){
    dungeon.currentTier = dungeon.totalTiers;
    dungeon = await finalizeDungeon(dungeon, 'won');
    toast('Tous les tiers sont vaincus : victoire !');
  } else {
    dungeon.currentTier = dungeon.tiersCompleted+1;
    if(dungeon.tiersCompleted % 2 === 0){
      dungeon.onBreak = true;
      dungeon.breakEnd = Date.now()+BREAK_MS;
    }
    await setData('dungeon', dungeon);
  }
  render();
}

  const dungeon = await getData('dungeon', null);

  let dungeon = await getData('dungeon', null);

// Il n'existe qu'une seule scène de rôle-play, fixée à l'avance par le jeu.
// L'admin ouvre le salon (bouton dans le panneau admin) : une invitation
// part aussitôt vers tous les joueurs, puis se répète toutes les 10
// minutes tant que personne n'a rejoint. Dès qu'un premier joueur rejoint
// le salon d'attente, un compte à rebours de 5 minutes démarre — une fois
// écoulé, la scène se lance automatiquement (aucune action de l'admin
// n'est nécessaire) et dure 1h. À la fin (ou pendant), l'admin déclare la
// réussite ou l'échec de la quête ; la réussite déverrouille le donjon
// final, le Château de l'Empereur Konne.
const KONNE_RP = {
  title: "L'Anneau de Konne",
  description: "Un émissaire vous approche discrètement : l'Anneau de Konne, artefact d'un pouvoir immense, aurait été localisé. Il faut le retrouver avant que d'autres ne s'en emparent — et convaincre un maximum de factions de rallier votre cause avant l'assaut final sur le château.",
  objectives: [
    "Trouver l'Anneau de Konne",
    "Rallier un maximum de factions alliées à votre cause"
  ],
  durationMin: 60,
  waitMin: 5,
  inviteIntervalMin: 10
};
const RP_WAIT_MS = KONNE_RP.waitMin*60000;
const RP_DURATION_MS = KONNE_RP.durationMin*60000;
const RP_INVITE_INTERVAL_MS = KONNE_RP.inviteIntervalMin*60000;

// Fait avancer l'état du salon si besoin : lancement automatique 5 min
// après l'arrivée du premier joueur, fin automatique après 1h de scène
// active, et relance des invitations toutes les 10 min tant que ce n'est
// pas terminé. Appelée à chaque affichage pertinent pour rester synchrone
// entre tous les joueurs (comme pour les donjons).
async function checkRpAutoResolve(rp){
  if(!rp || rp.status==='ended') return rp;

  if(rp.status==='draft' && rp.waitingSince && (rp.participants||[]).length && Date.now()-rp.waitingSince >= RP_WAIT_MS){
    rp.status = 'active';
    rp.startTime = Date.now();
    rp.endTime = Date.now() + RP_DURATION_MS;
    await setData('rpSession', rp);
  }

  if(rp.status==='active' && rp.endTime && Date.now() >= rp.endTime){
    rp.status = 'ended';
    await setData('rpSession', rp);
    return rp;
  }

  if((rp.status==='draft' || rp.status==='active') && rp.autoInviteEnabled){
    const last = rp.lastInviteAt || 0;
    if(Date.now() - last >= RP_INVITE_INTERVAL_MS){
      rp.lastInviteAt = Date.now();
      await setData('rpSession', rp);
      await sendRpInvites(rp);
    }
  }
  return rp;
}

// Envoie/renouvelle une invitation à tous les joueurs réels qui ne sont
// pas déjà dans le salon. On retire une éventuelle ancienne invitation
// avant d'en repousser une, pour que ça agisse comme un rappel plutôt
// que de s'empiler.
async function sendRpInvites(rp){
  const users = await getData('users', {});
  const notifs = await getData('notifications', {});
  const participants = rp.participants || [];
  let changed = false;
  Object.keys(users).forEach(key=>{
    const usr = users[key];
    if(!usr || usr.isAdmin || usr.isBot) return;
    if(participants.includes(key)) return;
    const mine = (notifs[key] || []).filter(n=>n.type!=='rpInvite');
    mine.push({type:'rpInvite', title:KONNE_RP.title, ts:Date.now()});
    notifs[key] = mine;
    changed = true;
  });
  if(changed) await setData('notifications', notifs);
}

// Ouvre le salon (bouton admin) : envoie la première invitation.
async function adminActivateRp(){
  const existing = await getData('rpSession', null);
  if(existing && existing.status!=='ended'){ toast('Le salon est déjà ouvert.'); return; }
  const rp = {
    status:'draft', autoInviteEnabled:true, lastInviteAt:Date.now(),
    waitingSince:null, startTime:null, endTime:null,
    participants:[], outcome:null
  };
  await setData('rpSession', rp);
  await sendRpInvites(rp);
  toast(`Invitations envoyées — le salon « ${KONNE_RP.title} » est ouvert.`);
  render();
}

async function adminToggleRpAutoInvite(){
  const rp = await getData('rpSession', null);
  if(!rp || rp.status==='ended') return;
  rp.autoInviteEnabled = !rp.autoInviteEnabled;
  if(rp.autoInviteEnabled) rp.lastInviteAt = Date.now();
  await setData('rpSession', rp);
  render();
}

async function adminSendRpInviteNow(){
  const rp = await getData('rpSession', null);
  if(!rp || rp.status==='ended') return;
  rp.lastInviteAt = Date.now();
  await setData('rpSession', rp);
  await sendRpInvites(rp);
  toast('Invitations envoyées.');
  render();
}

// Ignore le délai de 5 minutes et lance la scène immédiatement.
async function adminForceLaunchNow(){
  const rp = await getData('rpSession', null);
  if(!rp || rp.status!=='draft'){ toast('Le salon doit être ouvert et en attente.'); return; }
  rp.status = 'active';
  rp.startTime = Date.now();
  rp.endTime = Date.now() + RP_DURATION_MS;
  await setData('rpSession', rp);
  toast('Scène lancée immédiatement !');
  render();
}

async function adminExtendRpSession(minutes){
  const rp = await getData('rpSession', null);
  if(!rp || rp.status!=='active') return;
  rp.endTime += minutes*60000;
  await setData('rpSession', rp);
  toast(`${minutes} min ajoutées à la scène.`);
  render();
}

// Termine le salon sans se prononcer sur la réussite de la quête.
async function adminEndRpSession(){
  const rp = await getData('rpSession', null);
  if(rp){ rp.status = 'ended'; await setData('rpSession', rp); }
  toast('Scène terminée — le village est de nouveau accessible pour tous.');
  render();
}

// L'admin tranche : la quête est réussie (déverrouille le donjon final
// de Konne) ou échouée. Termine le salon dans les deux cas.
async function adminDeclareRpOutcome(outcome){
  const rp = await getData('rpSession', null);
  if(!rp){ toast("Aucun salon n'a encore été ouvert."); return; }
  rp.outcome = outcome;
  rp.status = 'ended';
  await setData('rpSession', rp);
  if(outcome==='success'){
    await setData('konneUnlocked', true);
    toast("Quête réussie ! Le Château de l'Empereur Konne est désormais déverrouillé.");
  } else {
    toast('Quête déclarée en échec — le donjon de Konne reste scellé.');
  }
  render();
}

// Réinitialise complètement le salon (pour une nouvelle tentative sans
// déclarer d'issue), sans toucher au verrou du donjon de Konne.
async function adminResetRp(){
  await setData('rpSession', null);
  toast('Le salon a été réinitialisé.');
  render();
}

// Un joueur rejoint le salon (après avoir accepté une invitation, ou
// depuis la carte du village). Démarre le compte à rebours de 5 minutes
// s'il est le premier à arriver.
async function joinRpScene(){
  const rp = await getData('rpSession', null);
  if(!rp || rp.status==='ended'){ toast('Ce salon est fermé pour le moment.'); S.view='village'; render(); return; }
  rp.participants = rp.participants || [];
  if(!rp.participants.includes(S.currentUser)){
    rp.participants.push(S.currentUser);
    if(rp.status==='draft' && !rp.waitingSince) rp.waitingSince = Date.now();
    await setData('rpSession', rp);
  }
  S.view = 'rp';
  render();
}

// ---------- Reward claiming ----------
function tapChest(){
  S.chestTaps++;
  const need = 3;
  const chestEl = document.getElementById('chest-el');
  if(chestEl){ chestEl.style.transform = `scale(${1+Math.min(S.chestTaps,need)*0.05})`; }
  if(S.chestTaps>=need){ claimReward(); }
  else { renderChestProgress(); }
}
function renderChestProgress(){
  const p = document.getElementById('chest-progress');
  if(p) p.textContent = `${S.chestTaps} / 3 — continue de taper !`;
}

async function claimReward(){
  const dungeon = await getData('dungeon', null);
  if(!dungeon) return;
  const cfg = DUNGEONS[dungeon.type];
  const users = await getData('users', {});
  const u = users[S.currentUser];
  const goldGain = dungeon.tiersCompleted * cfg.gold;
  const xpGain = dungeon.tiersCompleted * cfg.xp;

  const beforeLevel = u.level;
  u.gold += goldGain;
  let xp = u.xp + xpGain;
  let level = u.level;
  while(level < MAX_LEVEL && xp >= xpNeeded(level)){
    xp -= xpNeeded(level);
    level++;
  }
  if(level>=MAX_LEVEL){ level=MAX_LEVEL; xp=0; }
  u.xp = xp; u.level = level;
  await setData('users', users);

  dungeon.rewardsClaimed = dungeon.rewardsClaimed || [];
  if(!dungeon.rewardsClaimed.includes(S.currentUser)) dungeon.rewardsClaimed.push(S.currentUser);
  await setData('dungeon', dungeon);

  const isGrandVictory = dungeon.type==='impossible' && dungeon.status==='won' && !dungeon.finishedByBots;

  S.view='village';
  S.chestTaps=0;
  render();

  if(isGrandVictory){
    const heroNames = (dungeon.participants||[]).map(p=>users[p]?users[p].pseudo:p);
    showEpilogueCinematic(heroNames);
  } else if(level>beforeLevel){
    showLevelUp(level);
  }
  toast(`+${goldGain} or, +${xpGain} xp`);
}

function showLevelUp(level){
  const el = document.getElementById('overlays');
  const div = document.createElement('div');
  div.className='levelup-overlay';
  div.innerHTML = `
    <div class="eyebrow">Niveau supérieur</div>
    <div class="levelup-num">${level}</div>
    <div class="muted" style="margin-top:10px;">Ton personnage atteint le niveau ${level} !</div>
    <button class="btn btn-primary" style="margin-top:24px;" onclick="this.parentElement.remove()">Continuer</button>
  `;
  el.appendChild(div);
}

// ---------- Render dispatcher ----------
function render(){
  const app = document.getElementById('app');
  (async () => {
    if(S.currentUser && S.view!=='auth' && S.view!=='charCreate' && (await getRpLock())){
      S.view = 'rp';
    }
    const v = S.view;
    const routes = {
      auth: screenAuth, charCreate: screenCharCreate, village: screenVillage,
      personnage: screenPersonnage, guildes: screenGuildes, guildCreate: screenGuildCreate,
      donjons: screenDonjons, dungeonPlay: screenDungeonPlay, hotelVentes: screenHotelVentes,
      rp: screenRp,
      classements: screenClassements, adminPanel: screenAdmin
    };
    const fn = routes[v] || screenAuth;
    const html = await fn();
    app.innerHTML = html;
    renderToasts();
  })();
}

async function screenVillage(){
  const users = await getData('users', {});
  const u = users[S.currentUser];
  const season = await getData('season', {started:false});
  const notifs = await getData('notifications', {});
  const myNotifs = notifs[S.currentUser] || [];
  let dungeon = await getData('dungeon', null);
  dungeon = await checkAutoResolve(dungeon);
  if(dungeon && dungeon.status!=='active' && dungeon.participants && dungeon.participants.includes(S.currentUser) && !dungeon.rewardsClaimed.includes(S.currentUser)){
    S.view='dungeonPlay';
    return screenDungeonPlay();
  }
  if(dungeon && dungeon.status==='active' && dungeon.participants.includes(S.currentUser) && !dungeon.onBreak){
    S.view='dungeonPlay';
    return screenDungeonPlay();
  }
  let rp = await getData('rpSession', null);
  rp = await checkRpAutoResolve(rp);

  const cats = [
    {id:'personnage', icon:'🧙', label:'Personnage', sub:'Fiche & équipement'},
    {id:'guildes', icon:'🏰', label:'Guildes', sub:'Ta compagnie'},
    {id:'hotelVentes', icon:'🏛️', label:'Hôtel des ventes', sub:'Achète & vends'},
    {id:'donjons', icon:'💀', label:'Donjons', sub:'4 lieux périlleux'},
    {id:'rp', icon:'📜', label:'Rôle-play', sub: rp && rp.status==='active' ? `🟢 Scène en cours` : (rp && rp.status==='draft' ? `🕯️ Salon ouvert — rejoins-le` : 'Aucun salon ouvert')},
    {id:'classements', icon:'🏆', label:'Classements', sub:'Gloire & renom'}
  ];
  const cards = cats.map(c=>`
    <div class="navcard ${season.started? '' : 'locked'}" onclick="${season.started? `tryNav('${c.id}')` : ''}">
      <span class="icon">${c.icon}</span>
      <div class="label">${c.label}</div>
      <div class="sub">${season.started? c.sub : 'Verrouillé'}</div>
    </div>`).join('');

  const inviteBlock = myNotifs.length ? `
    <div class="panel" style="margin-top:20px;">
      <div class="eyebrow">Notifications</div>
      ${myNotifs.map((n,i)=>`
        <div class="memberrow">
          <span>${n.type==='rpInvite'
            ? `Le meneu de jeu te propose de rejoindre la scène <strong>${n.title}</strong>`
            : `${n.from} t'invite à rejoindre la guilde <strong>${n.guildName}</strong>`}</span>

            <button class="btn btn-small btn-danger" onclick="respondInvite(${i},false)">Refuser</button>
          </span>
        </div>`).join('')}
    </div>` : '';

  return `
    ${topbarHTML(u)}
    <div class="panel">
      <h2>Le Village</h2>
      <p class="muted">${season.started? "La saison est lancée. Choisis ta voie." : "L'administrateur n'a pas encore ouvert la saison. Reviens plus tard, voyageur."}</p>
      <div class="navgrid">${cards}</div>
    </div>
    ${inviteBlock}
  `;
}

async function screenDungeonPlay(){
  const users = await getData('users', {});
  const u = users[S.currentUser];
  let dungeon = await getData('dungeon', null);
  dungeon = await checkAutoResolve(dungeon);
  if(!dungeon || !dungeon.participants.includes(S.currentUser)){
    S.view='village'; return screenVillage();
  }
  const cfg = DUNGEONS[dungeon.type];

  if(dungeon.status !== 'active'){
    // reward screen
    const isGrandVictory = dungeon.type==='impossible' && dungeon.status==='won' && !dungeon.finishedByBots;
    const already = dungeon.rewardsClaimed && dungeon.rewardsClaimed.includes(S.currentUser);

    if(isGrandVictory){
      if(!dungeon.epilogueLaunched){
        return `
          ${confettiHTML(50)}
          ${topbarHTML(u)}
          <div class="panel center" style="flex-direction:column; margin-top:16px; padding:60px 20px;">
            <div class="victory-banner">
              <div class="victory-title">🏆 VICTOIRE FINALE 🏆</div>
              <p class="muted" style="margin-top:10px; max-width:460px; text-align:center;">${cfg.name} est vaincu ! Konne se souviendra de ${dungeon.participants.join(', ')} à jamais.</p>
            </div>
            <p class="muted" style="margin-top:18px;">Le meneu de jeu prépare l'épilogue... reste ici, tu vas y être transporté.</p>
          </div>`;
      }
      if(!already){
        dungeon.rewardsClaimed = dungeon.rewardsClaimed || [];
        dungeon.rewardsClaimed.push(S.currentUser);
        await setData('dungeon', dungeon);
        const heroNames = dungeon.participants.map(p=>users[p]?users[p].pseudo:p);
        S.view = 'village';
        const villageHtml = await screenVillage();
        showEpilogueCinematic(heroNames);
        return villageHtml;
      }
      S.view = 'village';
      return screenVillage();
    }

    if(already){
      return `
        ${topbarHTML(u)}
        <div class="panel center" style="flex-direction:column; margin-top:16px; padding:60px 20px;">
          <div class="eyebrow">${cfg.name}</div><h2>${dungeon.status==='won'? 'Victoire !' : 'Défaite...'}</h2>
          <p class="muted">Récompense déjà réclamée.</p>
          <button class="btn btn-primary" style="margin-top:14px;" onclick="goVillage()">Retourner au village</button>
        </div>`;
    }
    return `
      ${topbarHTML(u)}
      <div class="panel center" style="flex-direction:column; margin-top:16px; padding:50px 20px;">
        <div class="eyebrow">${cfg.name}</div>
        <h2 style="color:${dungeon.status==='won'?'var(--emerald-bright)':'var(--blood-bright)'};">${dungeon.status==='won'? 'Victoire !' : 'Défaite...'}</h2>
        <p class="muted">${dungeon.tiersCompleted} tier(s) réussi(s) sur ${dungeon.totalTiers}.</p>
        <p class="muted">Tape sur le coffre pour débloquer ta récompense.</p>
        <div id="chest-el" class="chest" onclick="tapChest()">🎁</div>
        <div id="chest-progress" class="muted" style="margin-top:12px;">0 / 3 — continue de taper !</div>
      </div>`;
  }

  // active tier display
  if(dungeon.onBreak){
    const remain = Math.max(0, dungeon.breakEnd - Date.now());
    const m = Math.floor(remain/60000), s = Math.floor((remain%60000)/1000);
    return `
      ${topbarHTML(u)}
      <div class="panel" style="margin-top:16px;">
        <div class="eyebrow">${cfg.name} — pause</div>
        <h2>Repos au campement</h2>
        <p class="muted">Temps avant la reprise : ${m}m ${s<10?'0':''}${s}s</p>
        <div class="navgrid" style="margin-top:16px;">
          <div class="navcard" onclick="tryNav('personnage')"><span class="icon">🧙</span><div class="label">Personnage</div></div>
          <div class="navcard" onclick="tryNav('guildes')"><span class="icon">🏰</span><div class="label">Guildes</div></div>
          <div class="navcard" onclick="tryNav('hotelVentes')"><span class="icon">🏛️</span><div class="label">Hôtel des ventes</div></div>
          <div class="navcard" onclick="tryNav('classements')"><span class="icon">🏆</span><div class="label">Classements</div></div>
        </div>
      </div>`;
  }

  const totalDuration = dungeon.totalTiers * TIER_MS;
  const remain = Math.max(0, totalDuration - (Date.now()-dungeon.startTime));
  const m = Math.floor(remain/60000), s = Math.floor((remain%60000)/1000);
  // Pour le donjon final (Château de l'Empereur Konne), les 3 derniers
  // tiers sont présentés comme trois phases de boss nommées plutôt que
  // comme de simples numéros de tier.
  const KONNE_BOSS_PHASES = 3;
  const isKonneDungeon = dungeon.type === 'impossible';
  const bossStartTier = isKonneDungeon ? Math.max(1, dungeon.totalTiers - KONNE_BOSS_PHASES + 1) : dungeon.totalTiers;
  const isBoss = dungeon.currentTier >= bossStartTier;
  const konnePhase = isKonneDungeon && isBoss ? (dungeon.currentTier - bossStartTier + 1) : null;
  return `
    ${topbarHTML(u)}
    <div class="panel ${isBoss?'boss-panel':''}" style="margin-top:16px; text-align:center;">
      <div class="eyebrow" style="${isBoss?'color:var(--blood-bright);':''}">${cfg.name} — ${cfg.diff}</div>
      ${isBoss? `<div class="boss-badge">⚔️ ${konnePhase ? `Konne — Phase ${konnePhase}` : 'Combat de boss'} ⚔️</div>` : ''}
      <div class="tier-display ${isBoss?'boss-tier-display':''}">${konnePhase ? konnePhase : dungeon.currentTier}</div>
      <div class="muted" style="margin-top:6px;">${konnePhase ? `Konne — Phase ${konnePhase} / ${KONNE_BOSS_PHASES}` : `sur ${dungeon.totalTiers} tiers`}</div>
      ${isBoss? `<p class="boss-warn">${konnePhase ? `L'Empereur Konne déchaîne sa puissance — phase ${konnePhase} sur ${KONNE_BOSS_PHASES}.` : 'Le donjon retient son souffle. C\'est ici que tout se joue.'}</p>` : ''}
      <div class="divider"></div>
      <label>Temps restant pour vaincre le donjon</label>
      <h3 style="font-size:32px; margin-top:6px; ${isBoss?'color:var(--blood-bright);':''}">${m}m ${s<10?'0':''}${s}s</h3>
      <p class="muted" style="font-size:13px; margin-top:4px;">Si le temps s'écoule avant la fin du donjon, c'est la défaite.</p>
      <p class="muted" style="margin-top:16px; font-size:14px;">Compagnons : ${dungeon.participants.join(', ')}</p>
    </div>
  `;
}

async function screenHotelVentes(){
  const users = await getData('users', {});

  const topCats = CATEGORY_TREE;

  let listings = (market.listings||[]).slice().sort((a,b)=>b.createdAt-a.createdAt);

  if(filterSub) listings = listings.filter(l=>l.categorySubId===filterSub);

  const filterHtml = `
    <div class="row" style="margin-bottom:6px;">
      <select style="max-width:220px;" onchange="setMarketFilter(this.value, '')">
        <option value="">Toutes les catégories</option>
        ${topCats.map(c=>`<option value="${c.id}" ${filterCat===c.id?'selected':''}>${c.name}</option>`).join('')}
      </select>
      ${filterCat && subCatsOfFilter.length ? `
        <select style="max-width:220px;" onchange="setMarketFilter('${filterCat}', this.value)">
          <option value="">Toutes les sous-catégories</option>
          ${subCatsOfFilter.map(s=>`<option value="${s.id}" ${filterSub===s.id?'selected':''}>${s.name}</option>`).join('')}

        ${rarityLine}

      </div>
      <div style="text-align:right;">
        <div class="badge gold" style="margin-bottom:8px;">${l.price} 🪙</div><br>
        <button class="btn btn-small btn-primary" ${u.gold<l.price?'disabled':''} onclick="buyMarketItem('${l.id}')">Acheter</button>
      </div>
    </div>`;

        <div class="row" style="margin-top:8px;">
          <select id="sell-item-name" style="max-width:240px;">

          <button class="btn btn-small btn-primary" type="submit">Mettre en vente</button>
        </div>

  return `

      <div class="eyebrow">Hôtel des ventes</div>

        ` : `
          <div class="row" style="margin-top:8px;">
            <input id="bot-timer-min" type="number" min="1" placeholder="Minutes avant que les bots terminent" style="max-width:260px;">
            <button class="btn btn-small" onclick="adminSetBotTimer()">Activer le minuteur secret</button>
          </div>
        `}
      ` : `<p class="muted" style="font-size:13px;">Disponible uniquement pendant qu'un donjon est actif.</p>`}
    `;
  }

  const userRows = realPlayers.map(x=>`
    <tr><td>${x.pseudo}</td><td>${CLASSES[x.class]?.label||'-'}</td><td>${x.level}</td><td>${x.gold}</td><td>${x.guildId? (guilds[x.guildId]?.name||'-') : '-'}</td></tr>
  `).join('');

  // ---- Bloc catégories (fixes) ----
  const topCats = CATEGORY_TREE;
  const catRows = topCats.map(c=>{
    return `<div class="memberrow"><span>${c.name}</span><span class="muted" style="font-size:13px;">${c.subs.length? c.subs.map(s=>s.name).join(', ') : 'aucune sous-catégorie'}</span></div>`;
  }).join('');

  // ---- Bloc création d'objets ----
  const rarityOptions = Object.keys(RARITIES).map(k=>`<option value="${k}">${RARITIES[k].label} (${RARITIES[k].min}-${RARITIES[k].max} or)</option>`).join('');
  const topCatOptions = topCats.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');

  // ---- Bloc catalogue d'objets (non assignés / assignés) ----
  const bots = Object.values(users).filter(x=>x.isBot);
  const botOptions = bots.slice(0,300).map(b=>`<option value="${Object.keys(users).find(k=>users[k]===b)}">${b.pseudo} (niv. ${b.level})</option>`).join('');
  const allItems = Object.values(itemCatalog).sort((a,b)=>b.createdAt-a.createdAt);
  const unassignedCount = allItems.filter(it=>!it.assignedTo).length;
  const listedCount = allItems.filter(it=>it.listed).length;
  const pendingCount = allItems.filter(it=>it.assignedTo && !it.listed).length;
  // priorité d'affichage : non-assignés d'abord (à traiter), puis les plus récents — limité à 40 lignes
  const displayItems = allItems.filter(it=>!it.assignedTo).slice(0,40)
    .concat(allItems.filter(it=>it.assignedTo).slice(0,10));
  const catalogRows = displayItems.map(it=>{
    const r = RARITIES[it.rarity]||{label:it.rarity,color:'var(--parchment-dim)'};
    let status;
    if(it.listed) status = `<span class="badge gold">En vente à l'hôtel des ventes</span>`;
    else if(it.assignedTo) status = `<span class="badge">Confié, mise en vente imminente…</span>`;
    else status = `
      <span class="row" style="align-items:center;">
        <select id="assign-bot-${it.id}" style="max-width:200px;"><option value="">— choisir un aventurier —</option>${botOptions}</select>
        <button class="btn btn-small" onclick="adminAssignItemToBot('${it.id}')">Confier & mettre en vente</button>
      </span>`;
    return `
      <div class="memberrow" style="align-items:flex-start; flex-wrap:wrap;">
        <span><strong>${it.name}</strong> <span style="color:${r.color}; font-size:12px; font-family:'Cinzel',serif;">${r.label}</span>
          <span class="muted" style="font-size:12px;"> — ${it.value} or ${it.categoryLabel? '· '+it.categoryLabel : ''}</span></span>
        <span>${status}</span>
      </div>`;
  }).join('') || '<p class="muted">Aucun objet créé pour l\'instant.</p>';

  return `
    ${topbarHTML(u)}
    <div class="panel">
      <div class="eyebrow">Panneau d'administration</div>
      <h2>Maître du jeu</h2>
      <div class="row" style="margin-top:14px;">
        <span class="badge ${season.started?'gold':''}">Saison ${season.started? 'active':'inactive'}</span>
        ${season.started? `<button class="btn btn-danger btn-small" onclick="adminEndSeason()">Arrêter la saison</button>`
                          : `<button class="btn btn-primary btn-small" onclick="adminStartSeason()">Lancer la saison</button>`}
        <span class="badge">🤖 ${botCount} bots vivants</span>
        <span class="badge">🏰 ${botGuildCount} guildes de bots</span>
        <span class="badge">🏛️ ${(market.listings||[]).length} objets en vente</span>
      </div>
      <div class="divider"></div>
      <label>Donjon en cours</label>
      ${dungeonBlock}
      <div class="divider"></div>
      <label>Joueurs réels (${realPlayers.length}) — les bots ne sont pas listés ici</label>
      <table><thead><tr><th>Pseudo</th><th>Classe</th><th>Niv.</th><th>Or</th><th>Guilde</th></tr></thead>
      <tbody>${userRows || '<tr><td class="muted">Aucun joueur inscrit.</td></tr>'}</tbody></table>
    </div>

    <div class="panel" style="margin-top:20px;">
      <div class="eyebrow">Rôle-play</div>
      <h2>${KONNE_RP.title}</h2>
      ${rpSession && rpSession.status==='active' ? `
        <div class="row" style="margin-bottom:12px;">
          <span class="badge gold">Scène en cours</span>
          <span class="badge">${Math.max(0,Math.ceil((rpSession.endTime-Date.now())/60000))} min restantes</span>
          <span class="badge">${(rpSession.participants||[]).length} présent(s)</span>
        </div>
        <p class="muted" style="font-size:13px;">Objectifs : ${KONNE_RP.objectives.join(' · ')}</p>
        ${(rpSession.participants||[]).length ? `<p class="muted" style="font-size:13px; margin-top:6px;">Présents : ${rpSession.participants.map(p=>users[p]?users[p].pseudo:p).join(', ')}</p>` : ''}
        <div class="divider"></div>
        <label>Invitations automatiques</label>
        <p class="muted" style="font-size:13px;">${rpSession.autoInviteEnabled ? `Activées — une invitation est renvoyée toutes les 10 minutes à ceux qui ne sont pas encore dans le salon.` : `Désactivées.`}</p>
        <div class="row" style="margin-top:8px;">
          <button class="btn btn-small" onclick="adminToggleRpAutoInvite()">${rpSession.autoInviteEnabled ? 'Désactiver' : 'Activer'} les invitations auto</button>
          <button class="btn btn-small" onclick="adminSendRpInviteNow()">Envoyer une invitation maintenant</button>
        </div>
        <div class="divider"></div>
        <label>Résolution de la quête</label>
        <p class="muted" style="font-size:13px;">Déclare l'issue quand tu juges que la scène est arrivée à son terme — cela ferme aussitôt le salon.</p>
        <div class="row" style="margin-top:8px;">
          <button class="btn btn-small" onclick="adminExtendRpSession(10)">+10 min</button>
          <button class="btn btn-primary btn-small" onclick="adminDeclareRpOutcome('success')">✅ Réussite (déverrouille Konne)</button>
          <button class="btn btn-danger btn-small" onclick="adminDeclareRpOutcome('failure')">❌ Échec</button>
          <button class="btn btn-small" onclick="adminEndRpSession()">Terminer sans trancher</button>
        </div>
        <p class="muted" style="font-size:13px; margin-top:10px;">La scène est lancée : les participants n'ont plus accès au reste du village tant qu'elle n'est pas terminée.</p>
      ` : rpSession && rpSession.status==='draft' ? `
        <div class="row" style="margin-bottom:12px;">
          <span class="badge gold">Salle d'attente ouverte</span>
          ${rpSession.waitingSince ? `<span class="badge">Lancement auto dans ${Math.max(0,Math.ceil((RP_WAIT_MS-(Date.now()-rpSession.waitingSince))/60000))} min</span>` : `<span class="badge">En attente du premier joueur</span>`}
          <span class="badge">${(rpSession.participants||[]).length} dans le salon</span>
        </div>
        <p class="muted" style="font-size:13px;">Dès qu'un premier joueur rejoint, la scène se lance automatiquement 5 minutes plus tard.</p>
        <div class="divider"></div>
        <label>Joueurs dans le salon d'attente</label>
        <p class="muted" style="margin-top:6px;">${(rpSession.participants||[]).length ? rpSession.participants.map(p=>users[p]?users[p].pseudo:p).join(', ') : "Personne pour l'instant — les invitations ont été envoyées."}</p>
        <div class="row" style="margin-top:12px;">
          <button class="btn btn-small" onclick="adminSendRpInviteNow()">Renvoyer les invitations</button>
          <button class="btn btn-small" onclick="adminToggleRpAutoInvite()">${rpSession.autoInviteEnabled ? 'Désactiver' : 'Activer'} les relances auto (10 min)</button>
        </div>
        <div class="row" style="margin-top:14px;">
          ${(rpSession.participants||[]).length ? `<button class="btn btn-primary btn-small" onclick="adminForceLaunchNow()">Lancer immédiatement (ignorer le délai)</button>` : ''}
          <button class="btn btn-small btn-danger" onclick="adminResetRp()">Fermer le salon</button>
        </div>
        <p class="muted" style="font-size:13px; margin-top:10px;">Tant que la scène n'a pas démarré, les joueurs présents gardent un accès au village s'ils le souhaitent.</p>
      ` : `
        <p class="muted">${rpSession && rpSession.outcome ? `Dernière issue déclarée : ${rpSession.outcome==='success'?'✅ réussite':'❌ échec'}.` : 'Aucun salon en préparation.'}</p>
        <p class="muted" style="font-size:13px; margin-top:6px;">Objectifs : ${KONNE_RP.objectives.join(' · ')} — durée de la scène une fois lancée : ${KONNE_RP.durationMin} min.</p>
        <button class="btn btn-primary" style="margin-top:12px;" onclick="adminActivateRp()">Ouvrir le salon et envoyer les invitations</button>
      `}
    </div>

    <div class="panel" style="margin-top:20px;">
      <div class="eyebrow">Hôtel des ventes — catégories</div>
      <h2>Catégories & sous-catégories</h2>
      <p class="muted" style="font-size:13px;">Ces catégories sont fixes — choisis simplement parmi elles en créant un objet ci-dessous.</p>
      <div style="margin-top:10px;">${catRows}</div>
    </div>

    <div class="panel" style="margin-top:20px;">
      <div class="eyebrow">Hôtel des ventes — objets</div>
      <h2>Créer un objet</h2>
      <form onsubmit="adminCreateItem(event)">
        <div class="row">
          <div class="field" style="flex:1; min-width:200px;"><label>Nom de l'objet</label><input id="item-name" type="text" placeholder="Épée de Konne"></div>
          <div class="field" style="min-width:200px;">
            <label>Rareté</label>
            <select id="item-rarity" onchange="updateRarityHint()">
              <option value="">— choisir —</option>
              ${rarityOptions}
            </select>
            <div id="rarity-hint" class="muted" style="font-size:12px; margin-top:4px;"></div>
          </div>
          <div class="field" style="max-width:140px;">
            <label>Quantité</label>
            <input id="item-qty" type="number" min="1" max="200" value="1">
          </div>
        </div>
        <div class="row">
          <div class="field" style="min-width:200px;">
            <label>Catégorie</label>
            <select id="item-cat" onchange="updateSubcatSelect()">
              <option value="">— Catégorie (optionnel) —</option>
              ${topCatOptions}
            </select>
          </div>
          <div class="field" style="min-width:200px;">
            <label>Sous-catégorie</label>
            <select id="item-subcat"><option value="">— Sous-catégorie (optionnel) —</option></select>
          </div>
        </div>
        <button class="btn btn-primary" type="submit">Créer l'objet (ou le lot)</button>
      </form>
      <div class="row" style="margin-top:14px;">
        <button class="btn" onclick="adminDistributeUnassigned()">🎲 Distribuer aléatoirement les objets non confiés à des bots</button>
      </div>
      <div class="divider"></div>
      <label>Catalogue d'objets — ${allItems.length} au total (${unassignedCount} à confier, ${pendingCount} en attente de mise en vente, ${listedCount} en vente)</label>
      ${allItems.length>displayItems.length? `<p class="muted" style="font-size:12px;">Affichage limité aux objets non-confiés en priorité + 10 plus récents assignés.</p>`:''}
      <div>${catalogRows}</div>
    </div>
  `;
}

boot();
</script>
</body>
</html>
